<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Performance Predictor</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --background:#09090b;
    --card:#18181b;
    --border:#27272a;
    --text:#fafafa;
    --muted:#a1a1aa;
    --primary:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--background);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:40px;
    box-shadow:
    0 10px 30px rgba(0,0,0,.4);
}

.badge{
    width:max-content;
    padding:8px 14px;
    border-radius:999px;
    background:#111827;
    border:1px solid #27272a;
    color:#d4d4d8;
    font-size:13px;
    margin-bottom:18px;
}

h1{
    color:white;
    font-size:42px;
    font-weight:800;
    line-height:1.1;
    margin-bottom:12px;
}

.subtitle{
    color:var(--muted);
    font-size:15px;
    margin-bottom:35px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.field{
    display:flex;
    flex-direction:column;
}

.field label{
    color:#e4e4e7;
    font-size:14px;
    margin-bottom:8px;
    font-weight:500;
}

.field input,
.field select{
    height:52px;
    border-radius:14px;
    border:1px solid var(--border);
    background:#09090b;
    color:white;
    padding:0 16px;
    font-size:15px;
    transition:.2s;
}

.field input:focus,
.field select:focus{
    outline:none;
    border-color:#52525b;
    box-shadow:0 0 0 3px rgba(255,255,255,.05);
}

.field option{
    background:#18181b;
}

.full{
    grid-column:1/-1;
}

.predict-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    background:white;
    color:black;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

.predict-btn:hover{
    transform:translateY(-2px);
}

.result{
    margin-top:28px;
    padding:24px;
    border-radius:20px;
    background:#0f172a;
    border:1px solid #1e293b;
    text-align:center;
}

.result-title{
    color:#94a3b8;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.result-score{
    color:white;
    font-size:52px;
    font-weight:800;
    margin-top:8px;
}

.result-sub{
    color:#94a3b8;
    margin-top:4px;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    h1{
        font-size:30px;
    }

    .card{
        padding:24px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="badge">
            Machine Learning Project
        </div>

        <h1>Student Performance Predictor</h1>

        <p class="subtitle">
            Predict mathematics performance using demographic and academic attributes.
        </p>

        <form action="/" method="POST">

            <div class="form-grid">

                <div class="field">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="">Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="field">
                    <label>Race / Ethnicity</label>
                    <select name="race_ethnicity" required>
                        <option value="">Select group</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="field">
                    <label>Parental Education</label>
                    <select name="parental_level_of_education" required>
                        <option value="">Select education</option>
                        <option value="some high school">Some High School</option>
                        <option value="high school">High School</option>
                        <option value="some college">Some College</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="master's degree">Master's Degree</option>
                    </select>
                </div>

                <div class="field">
                    <label>Lunch</label>
                    <select name="lunch" required>
                        <option value="">Select lunch type</option>
                        <option value="standard">Standard</option>
                        <option value="free/reduced">Free / Reduced</option>
                    </select>
                </div>

                <div class="field">
                    <label>Reading Score</label>
                    <input type="number" name="reading_score" min="0" max="100">
                </div>

                <div class="field">
                    <label>Writing Score</label>
                    <input type="number" name="writing_score" min="0" max="100">
                </div>

                <div class="field full">
                    <label>Test Preparation Course</label>
                    <select name="test_preparation_course" required>
                        <option value="">Select option</option>
                        <option value="completed">Completed</option>
                        <option value="none">None</option>
                    </select>
                </div>

                <div class="full">
                    <button class="predict-btn" type="submit">
                        Predict Math Score
                    </button>
                </div>

            </div>

        </form>

        {% if results %}

        <div class="result">

            <div class="result-title">
                Predicted Score
            </div>

            <div class="result-score">
                {{ "%.1f"|format(results) }}
            </div>

            <div class="result-sub">
                Estimated Mathematics Performance
            </div>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
